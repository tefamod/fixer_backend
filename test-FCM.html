<!doctype html>
<html>
  <head>
    <title>Get FCM Token</title>
  </head>
  <body>
    <h2>FCM Token Generator</h2>
    <button id="getTokenBtn">Get My FCM Token</button>
    <br /><br />
    <textarea
      id="token"
      rows="5"
      cols="80"
      placeholder="Token will appear here..."
    ></textarea>
    <p id="status" style="font-weight: bold"></p>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import {
        getMessaging,
        getToken,
      } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-messaging.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCjqNq1LkgU1vwDtXVWD5m-_qeWu0T4FsM",
        authDomain: "fixer-355fb.firebaseapp.com",
        projectId: "fixer-355fb",
        storageBucket: "fixer-355fb.firebasestorage.app",
        messagingSenderId: "964487015989",
        appId: "1:964487015989:web:74c40c475bc484a40a0b7c",
      };

      const app = initializeApp(firebaseConfig);
      const messaging = getMessaging(app);

      const setStatus = (msg, color = "blue") => {
        document.getElementById("status").style.color = color;
        document.getElementById("status").innerText = msg;
      };

      document
        .getElementById("getTokenBtn")
        .addEventListener("click", async () => {
          try {
            setStatus("Registering service worker...");

            // ✅ Explicitly register the service worker first
            const swRegistration = await navigator.serviceWorker.register(
              "/firebase-messaging-sw.js",
            );

            // Wait until it's active
            await navigator.serviceWorker.ready;

            setStatus("Requesting notification permission...");
            const permission = await Notification.requestPermission();
            if (permission !== "granted") {
              setStatus("❌ Permission denied!", "red");
              return;
            }

            setStatus("Getting FCM token...");
            const token = await getToken(messaging, {
              vapidKey:
                "BGiBzG5TQ6UrkSM8FqazW5Y6u6iip3sW04ewR4hwp_2gAdKYTXWeKea8FFuTaWSLzst5M3X54PBx9ym6l5-wB6c",
              serviceWorkerRegistration: swRegistration, // ✅ pass it explicitly
            });

            document.getElementById("token").value = token;
            setStatus("✅ Token generated! Copy it above.", "green");
            console.log("FCM Token:", token);
          } catch (err) {
            setStatus("❌ Error: " + err.message, "red");
            console.error("Full error:", err);
          }
        });
    </script>
  </body>
</html>
